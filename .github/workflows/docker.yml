name: Docker Build and Push

on:
    push:
        branches:
            - master
            - main
        tags:
            - 'v*'
    pull_request:
        branches:
            - master
            - main
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build:
        name: Build (${{ matrix.platform }})
        runs-on: ${{ matrix.runs-on }}
        timeout-minutes: 10

        strategy:
            matrix:
                include:
                    - platform: linux/amd64
                      runs-on: ubuntu-latest
                      suffix: amd64
                    - platform: linux/arm64
                      runs-on: ubuntu-24.04-arm
                      suffix: arm64

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: alexazhou/serverless_ai_gateway
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=ref,event=branch
                      type=sha,prefix=
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push Docker image (platform-specific)
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}-${{ matrix.suffix }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: ${{ matrix.platform }}
                  provenance: false

    merge:
        name: Merge and Push Manifest
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name != 'pull_request'
        timeout-minutes: 5

        permissions:
            contents: read
            packages: write

        steps:
            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract metadata for Docker
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: alexazhou/serverless_ai_gateway
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=ref,event=branch
                      type=sha,prefix=
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Create and push manifest list
              run: |
                  tags='${{ steps.meta.outputs.tags }}'
                  main_tag=$(echo "$tags" | head -1)

                  # Create manifest list using remote images (no pull needed)
                  docker manifest create "$main_tag" \
                      "$main_tag-amd64" \
                      "$main_tag-arm64"

                  # Push the manifest list
                  docker manifest push "$main_tag"

                  # Create additional tag aliases
                  for tag in $tags; do
                      if [ "$tag" != "$main_tag" ]; then
                          docker manifest create "$tag" \
                              "$tag-amd64" \
                              "$tag-arm64"
                          docker manifest push "$tag"
                      fi
                  done

            - name: Delete platform-specific tags
              run: |
                  tags='${{ steps.meta.outputs.tags }}'
                  username="${{ secrets.DOCKERHUB_USERNAME }}"
                  token="${{ secrets.DOCKERHUB_TOKEN }}"

                  for tag in $tags; do
                      # Delete amd64 suffix tag
                      curl -s -X DELETE \
                          -H "Authorization: Basic $(echo -n "$username:$token" | base64)" \
                          "https://hub.docker.com/v2/repositories/alexazhou/serverless_ai_gateway/tags/${tag#*:}-amd64/" || true

                      # Delete arm64 suffix tag
                      curl -s -X DELETE \
                          -H "Authorization: Basic $(echo -n "$username:$token" | base64)" \
                          "https://hub.docker.com/v2/repositories/alexazhou/serverless_ai_gateway/tags/${tag#*:}-arm64/" || true
                  done