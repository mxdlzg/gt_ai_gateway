name: Tauri Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build macOS App (${{ matrix.target }})
    runs-on: macos-14 # Use Apple Silicon runner
    timeout-minutes: 30
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Verify Version Consistency
        run: bash script/verify_versions.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          architecture: ${{ matrix.target == 'x86_64-apple-darwin' && 'x64' || 'arm64' }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri/src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install tauri dependencies
        run: cd tauri && npm ci

      - name: Build backend sidecar
        run: |
          if [ "${{ matrix.target }}" == "x86_64-apple-darwin" ]; then
            npm run tauri:build-backend-x86_64
          else
            npm run tauri:build-backend-arm64
          fi

      - name: Install Apple Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p build build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p build build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k build build.keychain

      - name: Build Tauri App (Unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: './tauri'
          args: '--target ${{ matrix.target }} --bundles app'

      - name: Manual Code Sign and Notarization
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd tauri/scripts
          python3 -u build_release.py ${{ matrix.target }}

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macOS-app-${{ matrix.target }}
          path: tauri/build/target/${{ matrix.target }}/release/bundle/signed_dmg/*.dmg
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-mac
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check version tag
        id: version_tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v[0-9]+(\.[0-9]+)+$ ]]; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release for non-version tag: $tag"
          fi

      - name: Download macOS artifacts
        if: steps.version_tag.outputs.matched == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: macOS-app-*
          path: release-artifacts
          merge-multiple: true

      - name: Create or update release
        if: steps.version_tag.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          mapfile -t assets < <(find release-artifacts -type f -name "*.dmg" | sort)

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            if [ "${#assets[@]}" -gt 0 ]; then
              gh release upload "$tag" "${assets[@]}" --clobber
            fi
            exit 0
          fi

          if [ "${#assets[@]}" -gt 0 ]; then
            gh release create "$tag" "${assets[@]}" --title "$tag" --generate-notes
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
