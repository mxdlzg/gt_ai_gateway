name: Tauri Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: tauri-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-win:
    name: Build Windows App (x86_64-pc-windows-msvc)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify Version Consistency
        shell: bash
        run: bash script/verify_versions.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri/src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install tauri dependencies
        run: pnpm --dir tauri install --frozen-lockfile

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUILD_TARGET: x86_64-pc-windows-msvc
          SHELL: bash
          npm_config_script_shell: bash
        with:
          projectPath: './tauri'
          args: '--target x86_64-pc-windows-msvc --bundles nsis'

      - name: Upload Windows Artifacts
        shell: pwsh
        run: |
          $artifactsDir = "windows-artifacts"
          New-Item -ItemType Directory -Force -Path $artifactsDir | Out-Null

          # Find NSIS setup exe and rename to include platform name
          $setupExe = Get-ChildItem "tauri" -Recurse -Include "*.exe" -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*setup*" } | Select-Object -First 1

          if ($setupExe) {
            # Insert _Windows before version: GT.AI.Gateway_1.6.0_x64-setup.exe -> GT.AI.Gateway_Windows_1.6.0_x64-setup
            $baseName = $setupExe.Name -replace '_(\d+\.\d+\.\d+)_', '_Windows_$1_' -replace '\.exe$', ''
            $zipPath = Join-Path $artifactsDir "$baseName.zip"
            Compress-Archive -Path $setupExe.FullName -DestinationPath $zipPath -Force
          }

          Get-ChildItem $artifactsDir | ForEach-Object { Write-Host "UPLOAD: $($_.Name) ($($_.Length) bytes)" }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Windows-app-x86_64
          path: windows-artifacts/
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-win]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check version tag
        id: version_tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v[0-9]+(\.[0-9]+)+$ ]]; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release for non-version tag: $tag"
          fi

      - name: Download Windows artifacts
        if: steps.version_tag.outputs.matched == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: Windows-app-*
          path: release-artifacts-win
          merge-multiple: true

      - name: Create or update release
        if: steps.version_tag.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          mapfile -t win_assets < <(find release-artifacts-win -type f -name "*.zip" 2>/dev/null | sort)
          assets=("${win_assets[@]}")

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            if [ "${#assets[@]}" -gt 0 ]; then
              gh release upload "$tag" "${assets[@]}" --clobber
            fi
            exit 0
          fi

          if [ "${#assets[@]}" -gt 0 ]; then
            gh release create "$tag" "${assets[@]}" --title "$tag" --generate-notes
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
