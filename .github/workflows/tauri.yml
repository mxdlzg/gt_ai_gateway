name: Tauri Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build macOS App
    runs-on: macos-14 # Use Apple Silicon runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri/src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install tauri dependencies
        run: cd tauri && npm ci

      - name: Build backend sidecar
        run: npm run tauri:build-backend

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: './tauri'
          args: '--target aarch64-apple-darwin'

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS-app
          path: |
            tauri/build/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            tauri/build/target/aarch64-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-mac
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      actions: read

    steps:
      - name: Check version tag
        id: version_tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v[0-9]+(\.[0-9]+)+$ ]]; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
            echo "Skipping release for non-version tag: $tag"
          fi

      - name: Download macOS artifacts
        if: steps.version_tag.outputs.matched == 'true'
        uses: actions/download-artifact@v4
        with:
          name: macOS-app
          path: release-artifacts

      - name: Create or update release
        if: steps.version_tag.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          mapfile -t assets < <(find release-artifacts -type f -name "*.dmg" | sort)

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists"
            if [ "${#assets[@]}" -gt 0 ]; then
              gh release upload "$tag" "${assets[@]}" --clobber
            fi
            exit 0
          fi

          if [ "${#assets[@]}" -gt 0 ]; then
            gh release create "$tag" "${assets[@]}" --title "$tag" --generate-notes
          else
            gh release create "$tag" --title "$tag" --generate-notes
          fi
