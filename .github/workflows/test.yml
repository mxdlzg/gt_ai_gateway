name: Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - main

env:
  STREAM_LOG_ENABLED: true
  TEST_REAL_API: false

jobs:
  test-node:
    name: Test (Node Mode)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}


      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'frontend/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Run type check
        run: npm run backend:test:type

      - name: Run tests (Node mode)
        run: npm run backend:test:node

  test-worker:
    name: Test (Worker Mode)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}


      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json', 'frontend/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Run tests (Worker mode)
        run: npm run backend:test:worker
